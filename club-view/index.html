<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Club View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet" />
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem('club-view-theme');
        document.documentElement.dataset.theme = ['club', 'arena', 'brawl'].includes(storedTheme) ? storedTheme : 'club';
      } catch {
        document.documentElement.dataset.theme = 'club';
      }
    })();
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Brawl Stars Club Dashboard</p>
        <h1>CBA Veterans</h1>
        <p class="subline">
          Read-only &Uuml;bersicht f&uuml;r Aktivit&auml;t, Schutzstatus und Kick-Kandidaten.
        </p>
      </div>
      <div class="hero-side">
        <div class="hero-actions">
          <div class="theme-switch">
            <span class="theme-switch-label">Mode</span>
            <div class="theme-switcher" role="group" aria-label="Light, Dark oder Brawl Mode ausw&auml;hlen">
              <button class="theme-option" type="button" data-theme-value="club" aria-pressed="true">Light</button>
              <button class="theme-option" type="button" data-theme-value="arena" aria-pressed="false">Dark</button>
              <button class="theme-option" type="button" data-theme-value="brawl" aria-pressed="false">Brawl</button>
            </div>
          </div>
          <p id="data-state" class="refresh-state">Stand: -</p>
        </div>
        <button id="refresh-button" class="button hero-button" type="button">Aktualisieren</button>
      </div>
    </header>

    <section class="panel overview-panel">
      <div class="overview-panel-header">
        <div class="overview-last-stand">
          <span class="overview-last-stand-label">Letzter Stand</span>
          <strong id="metric-snapshot" class="overview-last-stand-value">-</strong>
        </div>
      </div>
      <div class="overview-visuals">
        <div class="overview-main">
          <div id="overview-chart-state" class="detail-history-state is-visible">Lade Status-Verteilung ...</div>
          <div id="overview-chart"></div>
        </div>
        <div class="overview-gain-panel">
          <div id="overview-gain-state" class="detail-history-state is-visible">Lade 3v3-Gain ...</div>
          <div id="overview-gain-chart"></div>
        </div>
      </div>
    </section>

    <section class="panel members-panel">
      <section class="search-panel">
        <div class="toolbar-block">
          <label for="search-input">Suche</label>
          <input id="search-input" type="search" placeholder="Name oder Tag" />
        </div>
      </section>

      <section class="toolbar">
        <div class="toolbar-row toolbar-row-filters">
          <div class="toolbar-block">
            <label for="status-filter">Status</label>
            <select id="status-filter">
              <option value="all">Alle</option>
              <option value="kritisch">Kritisch</option>
              <option value="fraglich">Beobachten</option>
              <option value="aktiv">Aktiv</option>
              <option value="geschuetzt">Gesch&uuml;tzt</option>
            </select>
          </div>
          <div class="toolbar-block">
            <label for="reason-filter">Notizen</label>
            <select id="reason-filter">
              <option value="all">Alle</option>
              <option value="no_snapshot">Kein Stand</option>
              <option value="no_progress">Kein Progress</option>
              <option value="no_gain">Kein 3v3-Zuwachs</option>
              <option value="lt20">&lt; 20 3v3-Gain</option>
              <option value="lt42">&lt; 42 3v3-Gain</option>
              <option value="below_goal">Unter Wochenziel</option>
              <option value="min_3v3">Unter Mindest-3v3</option>
              <option value="leadership">Leadership</option>
              <option value="protected">Gesch&uuml;tzt</option>
            </select>
          </div>
        </div>
        <div class="toolbar-row toolbar-row-sort">
          <div class="toolbar-block mobile-sort-block">
            <label for="mobile-sort-key">Sortieren nach</label>
            <div class="mobile-sort-controls">
              <select id="mobile-sort-key">
                <option value="wins_display">3v3-Gain (7 Tage)</option>
                <option value="status">Status</option>
                <option value="last_progress_date">Letzter 3v3 Sieg</option>
                <option value="team_wins_total">3v3 Siege</option>
                <option value="trophies_total">Troph&auml;en</option>
                <option value="trophies_display">Trophy-Gain (7 Tage)</option>
                <option value="tracking_start_date">Tracking seit</option>
                <option value="reason">Notizen</option>
                <option value="name">Name</option>
              </select>
              <button id="mobile-sort-direction" class="ghost-button sort-direction-button" type="button"
                aria-label="Aufsteigend sortieren" title="Aufsteigend">
                ↑
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="table-panel">
        <div id="table-state" class="table-state">Lade Daten ...</div>
        <div id="mobile-list" class="mobile-list"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="name">
                    <span class="sort-label">Name</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="status">
                    <span class="sort-label">Status</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="last_progress_date">
                    <span class="sort-label">Letzter 3v3 Sieg</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="wins_display">
                    <span class="sort-label">3v3-Gain (7 Tage)</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="team_wins_total">
                    <span class="sort-label">3v3 Siege</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="trophies_total">
                    <span class="sort-label">Troph&auml;en</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="trophies_display">
                    <span class="sort-label">Trophy-Gain (7 Tage)</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="tracking_start_date">
                    <span class="sort-label">Tracking seit</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
                <th aria-sort="none">
                  <button class="sort-button" type="button" data-sort-key="reason">
                    <span class="sort-label">Notizen</span>
                    <span class="sort-icon" aria-hidden="true"></span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="dashboard-body"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <div id="detail-backdrop" class="detail-backdrop" hidden></div>
  <aside id="detail-panel" class="detail-panel" hidden aria-hidden="true">
    <div class="detail-panel-inner">
      <header class="detail-header">
        <div>
          <p class="detail-kicker">Spielerdetails</p>
          <h2 id="detail-name" class="detail-name">-</h2>
          <p id="detail-tag" class="detail-tag">-</p>
        </div>
        <button id="detail-close" class="detail-close" type="button" aria-label="Detailansicht schlie&szlig;en">
          <span aria-hidden="true">&times;</span>
        </button>
      </header>

      <div id="detail-status-row" class="chip-list detail-status-row"></div>

      <section class="detail-section">
        <h3>&Uuml;berblick</h3>
        <div id="detail-metrics" class="detail-metrics"></div>
      </section>

      <section class="detail-section">
        <h3>Notizen</h3>
        <div id="detail-reasons" class="chip-list"></div>
      </section>

      <section class="detail-section">
        <h3>Verlauf</h3>
        <div class="detail-range-controls" role="group" aria-label="Verlaufszeitraum">
          <button class="ghost-button detail-range-button is-active" type="button" data-history-days="7"
            aria-pressed="true">7 Tage</button>
          <button class="ghost-button detail-range-button" type="button" data-history-days="30" aria-pressed="false">30
            Tage</button>
        </div>
        <div id="detail-history-state" class="detail-history-state">W&auml;hle einen Spieler aus.</div>
        <div id="detail-charts" class="detail-charts"></div>
      </section>
    </div>
  </aside>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>

</html>
